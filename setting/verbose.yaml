cli_print_templates:
  meta:
    purpose: "Readable command-line print template for 8-player Werewolf MAS simulation"
    style: "simple, structured, informative"
    scope:
      - "werewolf discussion view"
      - "seer check view"
      - "witch save/poison view"
      - "night result"
      - "day speech"
      - "day voting result"

  experiment_start:
    - "=== Werewolf Simulation Start ==="
    - "Global seed: {global_seed}"
    - "Rounds: {num_rounds}"
    - "Players: {num_players}"
    - "Role config: {role_config}"

  round_start:
    - ""
    - "================ Round {round_id} ================"
    - "Runtime seed: {runtime_seed}"
    - "Alive players: {alive_players}"
    - "Dead players: {dead_players}"

  night_start:
    - "[Night {round_id}] Start"

  werewolf_discussion_start:
    - "[Night {round_id}][Werewolf Discussion] Start"
    - "Alive werewolves: {alive_werewolves}"
    - "Candidate targets: {candidate_targets}"

  werewolf_discussion_message:
    - "[Night {round_id}][Werewolf {speaker}]"
    - "Reasoning: {reason}"
    - "Preferred target: {target}"

  werewolf_discussion_end:
    - "[Night {round_id}][Werewolf Discussion] Final target: Player {target}"

  seer_view:
    - "[Night {round_id}][Seer] Check target: Player {target}"
    - "[Night {round_id}][Seer] Result: {result}"
    - "[Night {round_id}][Seer] Reason: {reason}"

  witch_view_start:
    - "[Night {round_id}][Witch] Observed kill target: Player {killed_target}"
    - "[Night {round_id}][Witch] Antidote available: {antidote_available}"
    - "[Night {round_id}][Witch] Poison available: {poison_available}"

  witch_view_decision:
    - "[Night {round_id}][Witch] Save target: {saved_target}"
    - "[Night {round_id}][Witch] Poison target: {poisoned_target}"
    - "[Night {round_id}][Witch] Reason: {reason}"

  night_result:
    - "[Night {round_id}] Result"
    - "Werewolf target: {killed_target}"
    - "Saved target: {saved_target}"
    - "Poisoned target: {poisoned_target}"
    - "Night dead players: {night_dead_players}"
    - "Alive players after night: {alive_players}"

  day_start:
    - "[Day {round_id}] Start"
    - "[Day {round_id}] Announcement: {announcement}"
    - "[Day {round_id}] Alive players: {alive_players}"

  speech_start:
    - "[Day {round_id}][Speech] Player {speaker} Start"

  speech_content:
    - "Role view: {role_view}"
    - "Main suspicion: {target}"
    - "Reason: {reason}"
    - "Vote target: {vote_target}"
    - "Speech: {speech}"

  speech_end:
    - "[Day {round_id}][Speech] Player {speaker} End"

  voting_start:
    - "[Day {round_id}][Voting] Start"
    - "Alive voters: {alive_players}"

  individual_vote:
    - "[Day {round_id}][Vote] Player {speaker} -> Player {vote_target}"
    - "Reason: {reason}"

  vote_summary:
    - "[Day {round_id}][Voting] Summary"
    - "Vote map: {vote_map}"
    - "Eliminated player: {eliminated}"
    - "Alive players after voting: {alive_players}"

  no_elimination:
    - "[Day {round_id}][Voting] No elimination"
    - "Vote map: {vote_map}"
    - "Alive players remain: {alive_players}"

  round_summary:
    - "[Round {round_id}] Summary"
    - "Night dead players: {night_dead_players}"
    - "Day eliminated: {eliminated}"
    - "Alive players: {alive_players}"
    - "Werewolves alive: {werewolf_count}"
    - "Good players alive: {good_count}"

  win_check_continue:
    - "[Round {round_id}] Game continues"

  win_check_end:
    - "[Round {round_id}] Game over"
    - "Winner: {winner}"
    - "=== Werewolf Simulation End ==="

  placeholders:
    global_seed: "global experiment seed"
    num_rounds: "number of rounds"
    num_players: "number of players"
    role_config: "role configuration string"
    round_id: "current round id"
    runtime_seed: "system-generated runtime seed"
    alive_players: "list of alive player ids"
    dead_players: "list of dead player ids"
    alive_werewolves: "list of alive werewolf ids"
    candidate_targets: "list of possible targets"
    speaker: "current player id"
    target: "main target player id"
    vote_target: "vote target player id"
    result: "seer result: good or werewolf"
    reason: "short reasoning text"
    killed_target: "werewolf selected kill target"
    saved_target: "witch saved player id or none"
    poisoned_target: "witch poisoned player id or none"
    antidote_available: "true or false"
    poison_available: "true or false"
    night_dead_players: "list of players who died at night"
    announcement: "public day announcement"
    role_view: "villager / seer / witch / werewolf perspective label"
    speech: "final speech text"
    vote_map: "mapping from voter to target"
    eliminated: "eliminated player id or none"
    werewolf_count: "number of alive werewolves"
    good_count: "number of alive good players"
    winner: "wolf_team or good_team"

  recommended_print_order:
    - "experiment_start"
    - "round_start"
    - "night_start"
    - "werewolf_discussion_start"
    - "werewolf_discussion_message"
    - "werewolf_discussion_end"
    - "seer_view"
    - "witch_view_start"
    - "witch_view_decision"
    - "night_result"
    - "day_start"
    - "speech_start"
    - "speech_content"
    - "speech_end"
    - "voting_start"
    - "individual_vote"
    - "vote_summary"
    - "round_summary"
    - "win_check_continue or win_check_end"