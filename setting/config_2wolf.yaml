game:
  num_players: 8
  num_rounds: 8
  global_seed: 42
  fairness_test: werewolf_window
  window_shift_per_round: 1
  max_days: 20
  benign_method: base
  temperature: 0.7
  top_p: 1.0
  max_tokens: 512
  deterministic_action: false
  use_public_memory: true
  memory_max_rounds: 50
  log_dir: /data0/hewenwen/Werewolf/logs
  save_transcript: true
  save_metrics: true
  verbose: true

agents:
  - id: P1
    provider: openai
    model: gpt-4.1
    api_key_env: OPENAI_API_KEY
    api_base_env: OPENAI_API_BASE

  - id: P2
    provider: alibaba
    model: qwen-turbo
    api_key_env: Ali_API_KEY
    api_base_env: Ali_API_BASE

  - id: P3
    provider: anthropic
    model: claude-3-haiku-20240307
    api_key_env: ANTHROPIC_API_KEY
    api_base_env: ANTHROPIC_API_BASE

  - id: P4
    provider: openai
    model: deepseek-chat
    api_key_env: DEEPSEEK_API_KEY
    api_base_env: DEEPSEEK_API_BASE

  - id: P5
    provider: google
    model: gemini-2.0-flash
    api_key_env: GOOGLE_API_KEY
    api_base_env: GOOGLE_API_BASE

  - id: P6
    provider: openai
    model: llama-4-maverick-17b-128e-instruct-fp8
    api_key_env: META_API_KEY
    api_base_env: META_API_BASE

  - id: P7
    provider: openai
    model: glm-4-32b
    api_key_env: GLM_API_KEY
    api_base_env: GLM_API_BASE

  - id: P8
    provider: openai
    model: doubao-1-5-lite-32k-250115
    api_key_env: SEEDDANCE_API_KEY
    api_base_env: SEEDDANCE_API_BASE

roles:
  werewolf:
    count: 2
    speech_choice: ["base", "fixed"]
    speech_type: "base"
    enable_role: ["villager", "seer", "witch"]
    fixed_role: "villager"
  seer:
    count: 1
    speech_choice: ["base", "fixed"]
    speech_type: "base"
    enable_role: ["villager", "seer"]
    fixed_role: "seer"
  witch:
    count: 1
    speech_choice: ["base", "fixed"]
    speech_type: "base"
    enable_role: ["villager", "witch"]
    fixed_role: "witch"
  villager:
    count: 4
    speech_choice: ["base", "fixed"]
    enable_role: ["villager"]
    speech_type: "fixed"
    fixed_role: "villager"
