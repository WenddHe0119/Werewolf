speech_templates:
  meta:
    game: "8-player werewolf"
    roles:
      werewolf: 3
      seer: 1
      witch: 1
      villager: 3
    purpose: "MAS simulation speech template (claim mode)"
    style: "concise, structured, non-colloquial"

  placeholders:
    target: "suspected player"
    reason: "reasoning evidence"
    vote_target: "player to vote"
    result: "good or werewolf"
    action: "night action verb"
    player: "night action target"
    side: "seer claim to support"

  universal_structure:
    description: "recommended speech order"
    fields:
      - "current stance"
      - "main suspicion"
      - "supporting reasoning"
      - "vote decision"

  villager:
    templates:
      opening:
        - "Current information is limited. I focus on speech consistency and voting patterns."
        - "Player {target} appears suspicious due to {reason}."
        - "My current vote will be placed on {vote_target}."

      analytical:
        - "From the villager perspective, no private information is available."
        - "The behavior of {target} is inconsistent with a typical good player."
        - "Therefore I prioritize eliminating {vote_target}."

      defense:
        - "My statements are consistent with the public information."
        - "The accusation against me lacks logical support."
        - "The discussion should focus on {target}."

  seer:
    templates:
      claim:
        - "I claim the seer role."
        - "Last night I checked {target}, the result is {result}."
        - "Based on this information, the priority elimination target is {vote_target}."

      reasoning:
        - "The verification target was chosen because {reason}."
        - "Current known results suggest the suspicious player is {vote_target}."
        - "The vote should focus on {vote_target}."

      defense:
        - "My verification results are consistent with my voting proposal."
        - "If challenged, the alternative claim must explain the inconsistency."
        - "My vote remains on {vote_target}."

  witch:
    templates:
      claim:
        - "I claim the witch role."
        - "Last night I {action} {player}."
        - "{player} appears {result}."

      neutral:
        - "I evaluate the situation based on night events and public discussion."
        - "The behavior of {target} does not align with a cooperative good role."
        - "My vote will be placed on {vote_target}."

      information_hint:
        - "Night information suggests that {target} should be examined carefully."
        - "The current elimination priority is {vote_target}."

      leadership:
        - "The current board state requires a decisive vote."
        - "The strongest suspicion remains on {vote_target}."
        - "I recommend consolidating votes on this player."

  werewolf:
    templates:
      disguise_villager:
        - "From a villager perspective, I evaluate speech coherence."
        - "Player {target} shows suspicious reasoning because {reason}."
        - "I will vote for {vote_target}."

      follow_majority:
        - "Current discussion suggests {target} is a plausible suspect."
        - "Given the available arguments, I support eliminating {vote_target}."

      defense:
        - "The accusation against me lacks sufficient reasoning."
        - "The discussion should instead focus on {target}."
        - "My vote will remain on {vote_target}."

  day_phase:
    early_round:
      - "Information is limited. Evaluation is based on speech and behavior."
      - "Player {target} currently has the highest suspicion."
      - "Vote target: {vote_target}."

    mid_round:
      - "Discussion and voting history provide additional evidence."
      - "The most suspicious player remains {target}."
      - "Vote target: {vote_target}."

  output_format:
    description: "recommended MAS output structure"
    fields:
      role: "agent role"
      round: "game round"
      suspicion: "main suspected player"
      vote: "voting target"
      speech: "generated speech text"
